project:
  name: gridvision
  seed: 42

data:
  dataset_path: data/raw/insulators
  video_path: data/videos/demo.mp4

model:
  base_weights: yolov8n.pt
  img_size: 640

train:
  epochs: 50
  batch_size: 16
  device: 0        # 0 = GPU (Colab), cpu = servidor

export:
  onnx_path: models/gridvision.onnx
  quantize: true